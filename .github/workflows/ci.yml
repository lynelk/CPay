name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write  # Required for CodeQL

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build, test, and security scan the Spring Boot backend
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend – Build, Test & Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: InitializrSpringbootProject

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Build and run unit tests
        run: mvn -B verify --no-transfer-progress -Dspring.flyway.enabled=false
        env:
          # Provide placeholder env vars so application context loads in test
          DB_URL: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"
          DB_USERNAME: sa
          DB_PASSWORD: ""
          MAIL_USERNAME: noreply@example.com
          MAIL_PASSWORD: ""
          LOCK_FILE_DIR: /tmp/cpay/locks

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: InitializrSpringbootProject/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────────────────
  # OWASP Dependency-Check for known CVEs in Maven dependencies
  # ─────────────────────────────────────────────────────────────────────────
  owasp:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: backend

    defaults:
      run:
        working-directory: InitializrSpringbootProject

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            --no-transfer-progress || true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: InitializrSpringbootProject/target/dependency-check-report.html

  # ─────────────────────────────────────────────────────────────────────────
  # CodeQL SAST (Java)
  # ─────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Build for CodeQL
        working-directory: InitializrSpringbootProject
        run: mvn -B compile --no-transfer-progress -DskipTests
        env:
          DB_URL: "jdbc:h2:mem:testdb"
          DB_USERNAME: sa
          DB_PASSWORD: ""
          MAIL_USERNAME: noreply@example.com
          MAIL_PASSWORD: ""
          LOCK_FILE_DIR: /tmp/cpay/locks

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend – lint and build the React app
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: clientside

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: clientside/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linter
        run: npm run lint --if-present

      - name: Build React app
        run: npm run build
        env:
          CI: "false"   # Treat warnings as non-fatal during build
