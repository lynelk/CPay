server.httpport=${HTTP_PORT:9000}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cpayadmin}
spring.datasource.username=${DB_USERNAME:general}
spring.datasource.password=${DB_PASSWORD:general}

spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none


spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.timeout=15m

# -----------------------------------------------------------------------
# SSL / TLS
# To enable HTTPS, uncomment the four lines below, provide a valid PKCS12
# keystore, and set the corresponding environment variables.
# -----------------------------------------------------------------------
#server.ssl.key-store-type=PKCS12
#server.ssl.key-store=${SSL_KEY_STORE:classpath:keystore/springboot_letsencrypt.p12}
#server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeme}
#server.ssl.key-alias=${SSL_KEY_ALIAS:bootalias}

# -----------------------------------------------------------------------
# SMTP mail – all credentials via environment variables
# -----------------------------------------------------------------------
mail.host=${MAIL_HOST:smtp.gmail.com}
mail.port=${MAIL_PORT:587}
mail.username=${MAIL_USERNAME:noreply@example.com}
mail.password=${MAIL_PASSWORD:}
mail.properties_mail_smtp_auth=true
mail.properties_mail_smtp_starttls_enable=true

server.error.whitelabel.enabled=false


spring.mvc.static-path-pattern=/**
spring.resources.static-locations=classpath:/static/

spring.mvc.throw-exception-if-no-handler-found=false
spring.resources.add-mappings=true


# Lock files directory for scheduled jobs (use an absolute path in production)
custom.lockfiledirectory=${LOCK_FILE_DIR:/tmp/cpay/locks/}

# Set to SANDBOX for a sandbox system, LIVE for production
custom.gatewaystate=${GATEWAY_STATE:SANDBOX}

# SSL verification: set to true only in local development with self-signed certs
custom.ssl.skip-verify=${SSL_SKIP_VERIFY:false}

spring.flyway.group=true
spring.flyway.enabled=false

# -----------------------------------------------------------------------
# CORS – comma-separated list of allowed origins for the admin/merchant portals
# -----------------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:2019}

# -----------------------------------------------------------------------
# Actuator – protect with HTTP Basic; set env variables in production
# -----------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
actuator.username=${ACTUATOR_USERNAME:actuator}
actuator.password=${ACTUATOR_PASSWORD:changeme_in_production}

# Base URL used in password-reset emails (no trailing slash)
app.base.url=${APP_BASE_URL:http://localhost:9000}
